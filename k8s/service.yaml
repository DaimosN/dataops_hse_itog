apiVersion: v1
kind: Service
metadata:
  name: diabetes-service
  namespace: ml-platform
  labels:
    app: diabetes-service
    component: ml-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app: diabetes-service
---
# Headless service для service discovery (опционально)
apiVersion: v1
kind: Service
metadata:
  name: diabetes-service-headless
  namespace: ml-platform
spec:
  clusterIP: None
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: diabetes-service